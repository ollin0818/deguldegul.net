name: Deploy ver1.0.0 to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - "ver1.0.0/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-pages-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    environment:
      name: cloudflare-pages
      url: https://deguldegul.net
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Cloudflare credentials
        shell: bash
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::Repository variable CLOUDFLARE_ACCOUNT_ID is not configured."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Repository secret CLOUDFLARE_API_TOKEN is not configured."
            exit 1
          fi

      - name: Deploy ver1.0.0
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ver1.0.0 --project-name=deguldegul --branch=main --commit-hash=${{ github.sha }}
