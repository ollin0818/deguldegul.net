name: Deploy ver1.0.0 to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "ver1.0.0/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload ver1.0.0
        uses: actions/upload-pages-artifact@v3
        with:
          path: ver1.0.0

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
